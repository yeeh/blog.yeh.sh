---
layout: null
---
<!DOCTYPE html>
<html data-theme="{{ site.skin | default: 'spring' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="keywords" content="{% if page %}{% for tag in page.tags %}{{ tag }},{% endfor %}{% endif %}{{ site.keywords }}">
<meta name="description" content="{% if page %}{{ page.title }}.{% endif %} {{ site.description }}">
<title>{{ page.title }} &middot; {{ site.name }}</title>
<link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
(function () {
  try {
    var aliases = { mono:'winter', swiss:'winter', ink:'summer', warm:'autumn', signal:'spring' };
    var skin = localStorage.getItem('yeh-blog-skin');
    skin = aliases[skin] || skin;
    if (/^(spring|summer|autumn|winter)$/.test(skin || '')) {
      document.documentElement.setAttribute('data-theme', skin);
    }
  } catch (e) {}
}());
</script>
<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/css.css">
<link rel="alternate" type="application/rss+xml" href="{{ site.baseurl }}/rss.xml">
</head>
<body>
{% include header.html %}
{% include nav.html %}
{% include search.html %}
<div class="content layout">
{{ content }}
</div>
{% include link.html %}
{% include footer.html %}
{% include analytics.html %}
</body>
</html>
